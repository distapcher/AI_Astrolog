services:
  ai-astrolog:
    build: .
    image: ai_astrolog:latest
    restart: unless-stopped
    network_mode: host
    env_file:
      - .env
    volumes:
      - ./bot:/app/bot
      - ./prompts:/app/prompts
      - ./data:/data

  dashboard:
    image: ai_astrolog:latest
    restart: unless-stopped
    network_mode: host
    env_file:
      - .env
    command: ["python", "-m", "bot.dashboard"]
    volumes:
      - ./bot:/app/bot
      - ./data:/data
